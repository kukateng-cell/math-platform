name: CI

# ============ 持續整合 ============
# 每次 push / PR 到 main 時，自動執行：
#   1. 單元測試（純邏輯，無需 DB）
#   2. Lint + TypeScript 型別檢查
#   3. DB 整合測試（需 PostgreSQL service）
#   4. Migration + Seed smoke test
#   5. Next.js build 建置
#
# DB 測試與 smoke test 共用一個 PostgreSQL service container。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新推送時，取消舊的執行節省資源
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────── 單元測試（最快，優先跑）─────────
  unit-test:
    name: 單元測試
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 執行單元測試
        run: npm run test

  # ───────── 型別檢查 + Lint ─────────
  lint-typecheck:
    name: Lint 與型別檢查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript 型別檢查
        run: npm run typecheck

  # ───────── DB 整合測試 + Smoke Test（使用 PostgreSQL service）─────────
  db-test:
    name: DB 整合測試
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Schema sync
        run: npx prisma db push --accept-data-loss
        timeout-minutes: 3

      - name: DB 整合測試
        run: npx vitest run --config vitest.config.ts
        timeout-minutes: 5
        env:
          NODE_OPTIONS: --max-old-space-size=1024

      - name: Smoke test
        run: npm run test:smoke
        timeout-minutes: 5
        continue-on-error: true

  # ───────── 建置（最後把關，確保能產出可部署產物）─────────
  build:
    name: 建置
    needs: [unit-test, lint-typecheck]
    runs-on: ubuntu-latest
    # 提供最小必要環境變數，避免 next build 因缺少變數而中斷
    env:
      SESSION_SECRET: ci-build-placeholder-not-a-real-secret-32chars
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      SMTP_HOST: localhost
      SMTP_PORT: '587'
      SMTP_USER: ci
      SMTP_PASS: ci
      SMTP_FROM: ci@example.com
    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安裝依賴
        run: npm ci

      - name: 建置
        run: npm run build
